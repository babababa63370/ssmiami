<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers - Local Host</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="gameContainer"></div>

    <script>
        // 1. Configuration officielle du build de Subway Surfers
        window.config = {
            loader: "unity",
            debug: false,
            maxRatio: 16 / 9,
            minRatio: 9 / 16,
            title: "Subway Surfers: Miami",
            unityVersion: "2019.4.18f1",
            unityWebglBuildUrl: "Build/Miami/subway_miami_v1.json",
            fileSize: 31,
            cachedDecompressedFileSizes: {
                "subway_miami_v1.wasm.framework.unityweb": 425811,
                "subway_miami_v1.asm.framework.unityweb": 444038,
                "subway_miami_v1.asm.memory.unityweb": 2703865,
                "subway_miami_v1.wasm.code.unityweb": 21971555,
                "subway_miami_v1.data.unityweb": 34189276,
                "subway_miami_v1.asm.code.unityweb": 55509105,
            },
        };

        // 2. Le Mock Absolu : Version complète avec événements de mouvements
        window.PokiUnitySDK = new (function() {
            var self = this;
            this._initialized = 1;
            this.isAdBlocked = false;
            
            // Émulation de la classe d'instance interne d'Unity
            this.Instance = {
                Init: function() {
                    console.log("[PokiSDK] C# a appelé Instance.Init() -> Feu vert.");
                    return 1;
                },
                ready: function() { return 1; },
                isAdBlocked: function() { return false; },

                // === INTERCEPTION DES EVENEMENTS DE MOUVEMENT ===
                gameplayStart: function() { 
                    console.log("[PokiSDK] Mouvement détecté : gameplayStart()"); 
                },
                gameplayStop: function() { 
                    console.log("[PokiSDK] gameplayStop()"); 
                },
                gameLoadingFinished: function() { return true; },
                happyTime: function() { return true; },
                customEvent: function() { return true; },
                trackEvent: function() { return true; }
            };

            // Fonction d'évaluation appelée par eval dans la machine virtuelle
            this.initPokiBridge = function() {
                console.log("[PokiSDK] Pont initPokiBridge() instancié.");
                window.pokiBridge = {
                    isAdBlocked: false,
                    getLanguage: function() { return "fr"; },
                    getAdBlockerStatus: function() { return false; },
                    commercialBreak: function(cb) { if(cb) cb(); },
                    rewardedBreak: function(cb) { if(cb) cb(true); },
                    shareableURL: function() { return window.location.href; },
                    
                    // Sécurité mouvements sur le pont
                    gameplayStart: function() {},
                    gameplayStop: function() {}
                };
                return 1;
            };
        })();

        // Doublure plate pour les appels directs globaux
        window.initPokiBridge = window.PokiUnitySDK.initPokiBridge;

        // 3. Mock complet du SDK Web Poki standard (JS)
        window.PokiSDK = {
            init: function() { 
                return new Promise(function(resolve) {
                    console.log("[PokiSDK] Web SDK standard initialisé.");
                    resolve(true);
                });
            },
            gameLoadingStart: function() {},
            gameLoadingProgress: function() {},
            gameLoadingFinished: function() {},
            gameplayStart: function() {},
            gameplayStop: function() {},
            commercialBreak: function(cb) { if(cb) cb(); else return Promise.resolve(); },
            rewardedBreak: function(cb) { if(cb) cb(true); else return Promise.resolve(true); },
            getURLParam: function() { return ""; }
        };

        // 4. Neutralisation des fonctions d'erreur d'environnement (CORS local/Iframe)
        window.showUnitywebNoSupport = function() { 
            console.warn("[Patch] Interception de showUnitywebNoSupport."); 
        };
        if (window.parent) { 
            window.parent.showUnitywebNoSupport = window.showUnitywebNoSupport; 
        }
    </script>

    <script src="./master-loader.js"></script>

</body>
</html>
